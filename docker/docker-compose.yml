# ============================================================
# 内网 Agentic 云开发环境 - Docker Compose 配置
# 架构：Nginx 网关 → code-server（内置 Claude Code + 嵌入式工具链）
# ============================================================

services:
  # ==========================================================
  # 1. 网关层：Nginx 反向代理（唯一对外端口 8443）
  # ==========================================================
  gateway:
    image: nginx:alpine
    container_name: dev-gateway
    hostname: gateway
    ports:
      - "${GATEWAY_PORT:-8443}:8443"
    volumes:
      - ../configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../configs/ssl:/etc/nginx/ssl:ro
      - ../logs/nginx:/var/log/nginx
    depends_on:
      - code-server
      - filebrowser
    networks:
      devnet:
        aliases:
          - gateway.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate --spider https://localhost:8443/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================
  # 2. Code Server：Web 版 VS Code + Claude Code CLI（核心）
  # ==========================================================
  code-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.code-server
    image: code-server-custom:latest
    container_name: code-server
    hostname: code-server
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:-changeme}
      - SUDO_PASSWORD=${SUDO_PASSWORD:-changeme}
      # Claude Code API 配置（直接用 Anthropic 官方环境变量）
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      # 若使用兼容 Anthropic API 格式的内网代理，设置以上两项
    volumes:
      - ../workspace:/workspace
      - code-extensions:/home/coder/.local/share/code-server/extensions
      - code-config:/home/coder/.config/code-server
      - claude-config:/home/coder/.claude
    networks:
      devnet:
        aliases:
          - vscode.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================
  # 3. 文件浏览器（通过 /files/ 访问）
  # ==========================================================
  filebrowser:
    image: filebrowser/filebrowser:v2.27.0
    container_name: filebrowser
    hostname: filebrowser
    volumes:
      - ../workspace:/srv
      - filebrowser-db:/database
      - ../configs/filebrowser.json:/.filebrowser.json:ro
    environment:
      - FB_DATABASE=/database/filebrowser.db
      - FB_ROOT=/srv
      - FB_PORT=8080
    networks:
      devnet:
        aliases:
          - files.local
    restart: unless-stopped

  # ==========================================================
  # 4. LiteLLM 统一 LLM 网关（可选，--profile llm 启用）
  #    同时暴露 Anthropic /v1/messages 和 OpenAI /v1/chat/completions
  #    Claude Code、Cline、Roo Code 均可通过统一 key 访问内网 LLM
  # ==========================================================
  llm-gateway:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: llm-gateway
    hostname: llm-gateway
    profiles:
      - llm
    command: --config /app/config.yaml --port 4000
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-devenv}
      - INTERNAL_API_BASE=${INTERNAL_API_BASE:-}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
    volumes:
      - ../configs/litellm_config.yaml:/app/config.yaml:ro
      - litellm-cache:/app/.cache
    networks:
      devnet:
        aliases:
          - llm.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  devnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  code-extensions:
  code-config:
  claude-config:
  filebrowser-db:
  litellm-cache:
