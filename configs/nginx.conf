# ============================================================
# Nginx 反向代理配置
# 所有服务通过单一端口 8443 访问
# 支持内网 OpenAI 兼容 API 代理
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # 大文件支持
    client_max_body_size 500M;
    client_body_buffer_size 16k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript
        application/xml+rss application/rss+xml
        font/truetype font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ============================================================
    # 上游服务定义
    # ============================================================
    
    upstream code_server {
        server code-server:8080;
        keepalive 32;
    }

    upstream claude_web {
        server claude-web:3000;
        keepalive 32;
    }

    upstream file_browser {
        server filebrowser:8080;
        keepalive 32;
    }

    # ============================================================
    # 共享代理头设置
    # ============================================================
    
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ============================================================
    # 主服务器配置
    # ============================================================
    
    server {
        listen 8443 ssl http2;
        listen [::]:8443 ssl http2;
        server_name _;

        # SSL 证书
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ==========================================================
        # 1. Code Server - 主 IDE (路径: /)
        # ==========================================================
        location / {
            proxy_pass http://code_server/;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 86400s;
            
            proxy_buffering off;
            proxy_cache off;
            proxy_redirect / /;
            
            proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;
            proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
            proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
        }

        # ==========================================================
        # 2. Claude Code Web (路径: /claude/)
        # ==========================================================
        location /claude/ {
            proxy_pass http://claude_web/;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /claude;
            
            proxy_redirect / /claude/;
            proxy_cookie_path / /claude/;
            
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        location /claude/ws {
            proxy_pass http://claude_web/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }

        # ==========================================================
        # 3. LLM API 代理 (路径: /api/llm/)
        # 转发到内网 OpenAI 兼容 API
        # ==========================================================
        location /api/llm/ {
            # 从环境变量或配置文件读取目标 URL
            # 实际 URL 通过 resolver 或 upstream 配置
            
            # 假设内网 API 通过 docker network 访问
            # 也可以在 docker-compose 中配置 extra_hosts
            
            proxy_pass http://claude-web:3000/api/;
            proxy_http_version 1.1;
            
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE 流式响应支持
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
            
            # CORS 头
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Max-Age 86400 always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # ==========================================================
        # 4. 外部 LLM API 直接代理（可选）
        # 用于直接访问内网 LLM，绕过 Claude Code 服务
        # ==========================================================
        location /api/external/ {
            # 重写路径，去掉 /api/external
            rewrite ^/api/external/(.*) /$1 break;
            
            # 这里配置为占位符，实际部署时替换为内网 API 地址
            # 例如：proxy_pass http://10.0.0.100:8000/;
            # 或通过环境变量注入
            
            proxy_pass http://claude-web:3000/;
            proxy_http_version 1.1;
            
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 保留原始 Authorization header
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
            
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # ==========================================================
        # 5. 文件浏览器 (路径: /files/)
        # ==========================================================
        location /files/ {
            proxy_pass http://file_browser/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /files;
            
            proxy_redirect / /files/;
            proxy_cookie_path / /files/;
        }

        # ==========================================================
        # 6. Code Server 内置端口代理 (路径: /proxy/<port>/)
        # ==========================================================
        location ~ ^/proxy/(\d+)/(.*)$ {
            proxy_pass http://code_server:$1/$2;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        # ==========================================================
        # 7. 静态资源
        # ==========================================================
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ==========================================================
        # 8. 健康检查
        # ==========================================================
        location /health {
            access_log off;
            return 200 "{\"status\":\"healthy\",\"timestamp\":\"$time_iso8601\"}\n";
            add_header Content-Type application/json;
        }

        # ==========================================================
        # 9. 状态页
        # ==========================================================
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.20.0.0/16;
            deny all;
        }
    }
}
