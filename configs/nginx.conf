# ============================================================
# Nginx 反向代理配置
# 所有服务通过单一端口 8443 (HTTPS) 访问
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Docker 内置 DNS：用于懒解析（llm-gateway 等可选容器不存在时 nginx 仍可启动）
    resolver 127.0.0.11 valid=5s ipv6=off;

    # 大文件支持（上传固件等）
    client_max_body_size 500M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript image/svg+xml;

    # ============================================================
    # 上游服务
    # ============================================================
    upstream code_server {
        server code-server:8080;
        keepalive 32;
    }

    upstream file_browser {
        server filebrowser:8080;
        keepalive 32;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ============================================================
    # 主服务器（HTTPS 8443）
    # ============================================================
    server {
        listen 8443 ssl http2;
        listen [::]:8443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # ==================================================
        # 1. 健康检查（无认证）
        # ==================================================
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy"}';
        }

        # ==================================================
        # 2. 文件浏览器（/files/）
        # ==================================================
        location /files/ {
            proxy_pass http://file_browser/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name     /files;

            proxy_redirect    / /files/;
            proxy_cookie_path / /files/;
        }

        # ==================================================
        # 3. LiteLLM 统一 LLM 网关（/llm/）
        #    同时支持 Anthropic /v1/messages 和 OpenAI /v1/chat/completions
        #    使用变量 proxy_pass 实现懒解析：
        #    llm-gateway 容器不存在时请求返回 502，不影响 nginx 启动
        # ==================================================
        location /llm/ {
            set $llm_upstream http://llm-gateway:4000;
            proxy_pass $llm_upstream/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 流式响应（SSE）必须关闭缓冲
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ==================================================
        # 4. Nginx 内部状态（仅内网访问）
        # ==================================================
        location = /nginx_status {
            stub_status on;
            access_log off;
            allow 172.28.0.0/24;
            deny all;
        }

        # ==================================================
        # 5. Code Server（主入口，含 WebSocket 和内置端口代理）
        #    注意：必须放在最后（匹配 /）
        # ==================================================
        location / {
            proxy_pass http://code_server/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # 必须用 $http_host（含端口，如 localhost:8443），
            # code-server CSRF 检查会对比 Origin 头与 Host 头，两者端口须一致
            proxy_set_header Host       $http_host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout  60s;
            proxy_send_timeout     60s;
            proxy_read_timeout  86400s;

            proxy_buffering off;
            proxy_cache     off;
            proxy_redirect  / /;
        }
    }
}
